<h2>选择页面整体布局</h2>
<p class="subtitle">世界杯赛程追踪页面，哪种结构更符合你的使用习惯？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>单页标签切换</h3>
      <p>顶部 Tab 切换：赛程 | 积分榜 | 淘汰赛。所有内容在一个页面内，点击标签无缝切换。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>垂直滚动长页面</h3>
      <p>所有内容从上到下排列：先看今日赛程 → 下滑看积分榜 → 再下滑看淘汰赛对阵图。一滚到底。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>侧边栏导航</h3>
      <p>左侧固定导航栏，右侧内容区。可以快速跳转到任意板块，适合内容较多的页面。</p>
    </div>
  </div>
</div>

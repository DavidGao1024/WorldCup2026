<h2>选择视觉风格</h2>
<p class="subtitle">页面整体配色和氛围，你更喜欢哪种方向？</p>

<div class="cards">
  <div class="card" data-choice="sport" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:linear-gradient(135deg,#1a472a,#2d8a4e);padding:40px 20px;text-align:center;border-radius:4px">
        <div style="color:#ffd700;font-size:24px;font-weight:bold;margin-bottom:8px">WORLD CUP 2026</div>
        <div style="color:#fff;font-size:13px">USA · CANADA · MEXICO</div>
        <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
          <span style="background:#ffd700;color:#1a472a;padding:4px 12px;border-radius:3px;font-size:12px;font-weight:bold">赛程</span>
          <span style="background:rgba(255,255,255,0.2);color:#fff;padding:4px 12px;border-radius:3px;font-size:12px">积分榜</span>
          <span style="background:rgba(255,255,255,0.2);color:#fff;padding:4px 12px;border-radius:3px;font-size:12px">淘汰赛</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>运动绿茵风</h3>
      <p>深绿色主调 + 金色点缀，足球场草地氛围，沉稳大气</p>
    </div>
  </div>

  <div class="card" data-choice="modern" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:linear-gradient(135deg,#0f172a,#1e3a5f);padding:40px 20px;text-align:center;border-radius:4px">
        <div style="color:#38bdf8;font-size:24px;font-weight:bold;margin-bottom:8px">WORLD CUP 2026</div>
        <div style="color:#94a3b8;font-size:13px">USA · CANADA · MEXICO</div>
        <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
          <span style="background:#38bdf8;color:#0f172a;padding:4px 12px;border-radius:3px;font-size:12px;font-weight:bold">赛程</span>
          <span style="background:rgba(255,255,255,0.1);color:#cbd5e1;padding:4px 12px;border-radius:3px;font-size:12px">积分榜</span>
          <span style="background:rgba(255,255,255,0.1);color:#cbd5e1;padding:4px 12px;border-radius:3px;font-size:12px">淘汰赛</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>深色科技风</h3>
      <p>深蓝灰背景 + 亮蓝点缀，现代感、数据大屏风格，视觉冲击力强</p>
    </div>
  </div>

  <div class="card" data-choice="clean" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#ffffff;padding:40px 20px;text-align:center;border-radius:4px;border:1px solid #e2e8f0">
        <div style="color:#1e293b;font-size:24px;font-weight:bold;margin-bottom:8px">WORLD CUP 2026</div>
        <div style="color:#64748b;font-size:13px">USA · CANADA · MEXICO</div>
        <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
          <span style="background:#ef4444;color:#fff;padding:4px 12px;border-radius:3px;font-size:12px;font-weight:bold">赛程</span>
          <span style="background:#f1f5f9;color:#64748b;padding:4px 12px;border-radius:3px;font-size:12px">积分榜</span>
          <span style="background:#f1f5f9;color:#64748b;padding:4px 12px;border-radius:3px;font-size:12px">淘汰赛</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>简约白底风</h3>
      <p>白色背景 + 红色点缀，清爽干净，信息呈现直观清晰</p>
    </div>
  </div>
</div>

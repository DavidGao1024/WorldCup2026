        - paragraph [ref=e443]: 世界杯小组赛已经全部结束了！
        - paragraph [ref=e444]: 整体看下来，赛事的走向基本和我之前预判的大差不差，没什么意外的走势。
        - paragraph [ref=e445]: 不过有件小事还挺可惜的，就是昨天微博操作失误，把葡萄牙的方向给写反了。
        - paragraph [ref=e446]: 我平时习惯性把葡萄牙归为左边思路，昨天发完内容后，好多朋友过来私信问我，我这才反应过来出问题了，昨天左手边是哥伦比亚。
        - paragraph [ref=e447]: 但那时候内容已发出了，改也来不及了。
        - paragraph [ref=e448]: 不过大家只要认真看了我当时对比赛的完整分析，就能明白，我的核心思路一直没变，从头到尾都是看好哥伦比亚不败的。
        - paragraph [ref=e449]:
          - link [ref=e630]:
            - /url: https://mp.weixin.qq.com/s?__biz=MzYzODk2MjI5Nw==&mid=2247484032&idx=3&sn=5afa9be7eb2427a4c9c99124607dacf6&scene=21#wechat_redirect
            - text: 069世界杯哥伦比亚 VS 葡萄牙：梅西的迈阿密，哥伦比亚更受欢迎？
        - paragraph [ref=e452]: 这里跟大家通俗说下我的统计逻辑，一直都是分两个维度来算的。
        - paragraph [ref=e453]: 第一是纯内容层面，我对每一场比赛的战术分析；
        - paragraph [ref=e454]: 第二是实单统计，昨天这波确实失误了，实单这边要正常判错。
        - paragraph [ref=e455]: 道理很简单，大家一看就能懂，我就不多啰嗦了。
        - paragraph [ref=e456]: 另外还有个大家问得最多的问题，统一跟大家说清楚：我本人从来没有建过任何粉丝微信群。
        - paragraph [ref=e457]: 老朋友应该都记得，早在2020年口罩期间，我专门发过一篇文章，讲过解散所有社群的原因。
        - paragraph [ref=e458]: 从那之后，我就再也不新建任何群聊了。
        - paragraph [ref=e459]: 熟悉社群规则的朋友都知道，现在建群真的责任太大了。
        - paragraph [ref=e460]: 我这段时间下班后更新内容、做赛事分析本来就忙，根本没时间盯群。
        - paragraph [ref=e461]: 群里人多嘴杂，偶尔会有人聊些乱七八糟、没边际的话题，一旦出问题，所有责任都得群主承担。
        - paragraph [ref=e462]: 与其后续费心收拾烂摊子，不如一开始就不建，安稳省心。
        - paragraph [ref=e463]: 说句实在话，当年我手上有几百个五百人大群，那时候氛围是真的好，每天热热闹闹的，很多老粉到现在还念念不忘。
        - paragraph [ref=e464]: 可人多是非就多，2020年初那段时间，群里经常有人聊各种无关的敏感话题，最后导致我所有账号直接被限制发言一个月。
        - paragraph [ref=e465]: 也是经历过那次教训，我彻底想通透了，不碰社群自建这件事，毕竟只是把体彩当成爱好，平时大部分时间都在忙其他的事情。
        - paragraph [ref=e466]: 很多朋友看到我截图，发现我好像在各种球迷群里，就误以为是我建的群。
        - paragraph [ref=e467]: 这里澄清一下，我待的所有群，没有一个是我建的，全是各地素未谋面的球迷朋友拉我进去的。
        - paragraph [ref=e468]: 这些群主遍布全国各地，甚至还有海外的球迷。
        - paragraph [ref=e469]: 有阿根廷人的中国球迷群，有非洲的华人球迷群，还有德国、日本的中国人球迷群，大家热情把我拉进去，我平时有空就进去闲聊两句、插科打诨，纯属凑个热闹。
        - paragraph [ref=e470]: 粗略数了下，目前大概在两百多个聊体育的相关群里，但所有群的群主都不是我。
        - paragraph [ref=e471]: 很多人找我，想让我帮忙拉进群，这里统一跟大家解释下，这个事情一般群主不会接触陌生人进群。
        - paragraph [ref=e472]: 每个群主建群都特别谨慎，管控非常严格。
        - paragraph [ref=e473]: 能进群的要么是长期在门店出票的老球迷，要么是朋友圈经常交流、彼此眼熟的熟人，都是实打实的普通爱好者，知根知底。
        - paragraph [ref=e474]: 稍有乱象，群被封特别麻烦！
        - paragraph [ref=e475]: 所以每位群主对进群人员的审核也挺谨慎的，我随便推荐人进去，万一发生不开心的事情，不好解决。
        - paragraph [ref=e476]: 而且我在这些群里也很少说话，大多时候都是潜水，偶尔看到有意思的话题才聊两句。
        - paragraph [ref=e477]: 也有人说，我可以帮忙问问群主能不能拉人。
        - paragraph [ref=e478]: 说实话，真的没这个精力。
        - paragraph [ref=e479]: 每天找我要进群的人数不胜数，如果挨个去跟群主沟通、核实、对接，再一个个回复大家，我一整天什么事都不用干了。
        - paragraph [ref=e480]:
          - generic [ref=e481]:
            - text: 大家平时也能看到，我公众号

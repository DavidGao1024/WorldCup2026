name: 抓取体彩赔率

on:
  schedule:
    # 每15分钟运行一次
    - cron: '*/15 * * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  fetch-odds:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 抓取体彩赔率
        env:
          # 通过 Cloudflare Workers 反代绕过腾讯云 WAF 对 GitHub IP 的拦截
          # 在 repo Settings → Secrets → Actions 配置 ODDS_PROXY_URL
          ODDS_PROXY_URL: ${{ secrets.ODDS_PROXY_URL }}
        run: node scripts/fetch-odds.js

      - name: 提交更新（如有变化）
        run: |
          if git diff --quiet data/lottery-odds.json; then
            echo "赔率数据无变化，跳过提交"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/lottery-odds.json
            git commit -m "更新体彩赔率数据 [skip ci]"
            git push
            echo "赔率数据已更新并推送"
          fi

name: 更新伤病数据模板

on:
  schedule:
    # 每天运行一次（伤病数据变化频率低）
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  update-injuries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 更新伤病数据模板
        run: node scripts/fetch-injuries.js

      - name: 提交更新（如有变化）
        run: |
          if git diff --quiet data/injuries.json; then
            echo "伤病数据无变化，跳过提交"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/injuries.json
            git commit -m "更新伤病数据模板 [skip ci]"
            git push
            echo "伤病数据已更新并推送"
          fi

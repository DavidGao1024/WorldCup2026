<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="header-wrap">
  <header class="header">
    <canvas class="header-particles" id="header-canvas"></canvas>
    <div class="header-left">
      <div class="header-title-row">
        <img src="favicon.jpg" alt="" class="header-logo">
        <h1 id="title">2026 世界杯</h1>
      </div>
      <div class="subtitle" id="subtitle">大卫 · 高</div>
    </div>
    <div class="header-right">
      <select id="timezone-select">
        <option value="beijing">🇨🇳 北京时间 (UTC+8)</option>
        <option value="eastern">🇺🇸 美东时间 (UTC-4)</option>
        <option value="gmt">🌐 GMT (UTC+0)</option>
      </select>
      <div class="lang-toggle" id="lang-toggle">
        <span data-lang="zh" class="active">中</span>
        <span data-lang="en">EN</span>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <div class="tab active" id="tab-schedule" data-i18n="schedule" onclick="switchTab('schedule')">赛程</div>
    <div class="tab" id="tab-standings" data-i18n="standings" onclick="switchTab('standings')">积分榜</div>
    <div class="tab" id="tab-champions" data-i18n="champions" onclick="switchTab('champions')">历届冠军</div>
  </nav>
  </div>

  <main class="content">
    <div class="tab-content active" id="schedule-content">
      <div class="filters">
        <select id="filter-group" onchange="onFilterChange()"></select>
        <select id="filter-team" onchange="onTeamFilterChange()"></select>
      </div>
      <div id="schedule-list"></div>
    </div>
    <div class="tab-content" id="standings-content"></div>
    <div class="tab-content" id="knockout-content"></div>
    <div class="tab-content" id="champions-content"></div>
  </main>

  <footer class="footer">
    <p>Data: <a href="https://github.com/openfootball/worldcup.json" target="_blank" rel="noopener">openfootball/worldcup.json</a></p>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/timezone.js"></script>
  <script src="js/data.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/standings.js"></script>
  <script src="js/knockout.js"></script>
  <script src="js/champions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
